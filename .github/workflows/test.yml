# This workflow will not run without Autoscript.
name: Test

on:
  push:
    branches:
      - '**' # Trigger on any branch push
  pull_request:
    branches:
      - '**' # Trigger on any pull request
  workflow_call: # CRITICAL: Allows this workflow to be called by others

jobs:
  test:
    name: Run Subset of Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.8.12'
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run Pytest
        run: uv run pytest tests/test_example.py
