name: Release

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags (e.g., v1.0.0)
  workflow_dispatch:  # allows manual triggering of the workflow from the GitHub Actions tab

# Concurrency ensures that if you push again while a build is already running, the old one is canceled to save time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force all JavaScript actions to run on Node 24 (The 2026 Standard)
  # After 02 June 2026, the following line can be removed since on that date,
  # Node.js 24 will be the GitHub default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # GitHub will swtich on 02 June 2026 to Node.js 24 as the default for JavaScript actions, but until then, this ensures all actions use Node.js 24 to avoid any issues with older versions. After 02 June 2026, this line can be safely removed.

jobs:
  # 1. TEST JOB: Runs Pytest
  test:
    uses: ./.github/workflows/test.yml  # Reuse the test workflow defined in test.yml

  # 2. BUILD: Only runs if 'test' passes
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for versioning tools to see tags

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.8.12'
          enable-cache: true
          # cache-dependency-glob: "pyproject.toml"  # Delete this line after 'uv lock' run locally is used to create a uv.lock file, then uv.lock, the default, will be used for caching dependencies

      - name: Build
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # 3. GITHUB RELEASE: Creates the release on GitHub and attaches the build files
  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases and upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true # Automatically generate release notes based on commits since the last release
          draft: false # Set to true if you want to create a draft release instead of publishing immediately
          prerelease: false # Set to true if this is a pre-release (e.g., alpha, beta)

  # 4. PUBLISH: Only runs if 'build' passes
  publish:
    needs: [build, github-release] # Ensure both build and GitHub release steps succeed before publishing
    runs-on: ubuntu-latest
    # Optional: Use environment protection rule for manual approval before publishing
    environment: pypi
    permissions:
      id-token: write # Needed for authentication with PyPI using GitHub Actions
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
