name: Release

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags (e.g., v1.0.0)
  workflow_dispatch:  # allows manual triggering of the workflow from the GitHub Actions tab

# Concurrency ensures that if you push again while a build is already running, the old one is canceled to save time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. TEST JOB: Runs Pytest
  test:
    uses: ./.github/workflows/test-docker.yml  # Reuse the test workflow defined in test-docker.yml

  # 2. BUILD: Only runs if 'test' passes
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for versioning tools to see tags
          fetch-tags: true # Required for hatch-vcs to resolve the clean tag version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.8.12'
          enable-cache: true
          # cache-dependency-glob: "pyproject.toml"  # Delete this line after 'uv lock' run locally is used to create a uv.lock file, then uv.lock, the default, will be used for caching dependencies

      - name: Build
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # 3. UPDATE VERSION FILE: Commits the regenerated _version.py back to whichever
  #    branch (main or dev) the tag was cut from, so that zip downloads of this tag
  #    contain the correct version without git metadata.
  update-version-file:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine target branch
        id: target
        run: |
          BRANCH=$(git branch -r --contains HEAD | grep -E 'origin/(main|dev)' | head -1 | sed 's|.*origin/||' | tr -d ' ')
          echo "branch=${BRANCH:-main}" >> $GITHUB_OUTPUT

      - name: Checkout target branch
        run: git checkout ${{ steps.target.outputs.branch }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.8.12'
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Regenerate _version.py
        run: uv build

      - name: Patch _version.py header
        run: |
          # setuptools-scm regenerates _version.py with its default header on every
          # build. Replace those lines with text that reflects our intent to track
          # this file in version control.
          sed -i 's|^# file generated by setuptools-scm$|# file generated by setuptools-scm, intentionally tracked in version control|' src/pytribeam/_version.py
          sed -i "s|^# don't change, don't track in version control$|# do not edit manually — regenerated automatically by release.yml on each tagged release|" src/pytribeam/_version.py

      - name: Commit _version.py to target branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pytribeam/_version.py
          git diff --staged --quiet || git commit -m "chore: update _version.py to ${{ github.ref_name }}"
          git push origin ${{ steps.target.outputs.branch }}

  # 4. GITHUB RELEASE: Creates the release on GitHub and attaches the build files
  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases and upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true # Automatically generate release notes based on commits since the last release
          draft: false # Set to true if you want to create a draft release instead of publishing immediately
          prerelease: false # Set to true if this is a pre-release (e.g., alpha, beta)

  # 5. PUBLISH: Only runs if 'build' passes
  publish:
    needs: [build, github-release] # Ensure both build and GitHub release steps succeed before publishing
    runs-on: ubuntu-latest
    # Optional: Use environment protection rule for manual approval before publishing
    environment: pypi
    permissions:
      id-token: write # Needed for authentication with PyPI using GitHub Actions
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
