name: Prepare Release

# Manually triggered before cutting a release tag. Computes what hatch-vcs would
# stamp into `src/pytribeam/_version.py` for the given version and opens a PR with
# that change. This exists because release.yml intentionally never commits
# _version.py back after tagging (see the note in that file's github-release job) —
# so the file must be brought up to date *before* the tag is created, via a normal
# reviewed PR, or the file baked into a tagged zip download goes stale. See
# CONTRIBUTING.md's release section for the full runbook this fits into.
#
# _version.py is a static fallback ONLY for installs without git metadata (zip
# downloads, offline installs via pytribeam_install.bat) — hatch-vcs reads it back
# when it can't compute a version from git itself. Wheel/sdist installs are
# unaffected, since hatch-vcs always recomputes the version from git during `uv build`.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target release version, no leading 'v' (e.g. 1.0.0, 1.0.0rc1, 1.0.0.dev1)"
        required: true
      branch:
        description: "Branch to base the PR on"
        required: false
        default: "dev"

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.8.12'
          enable-cache: true

      - name: Validate version is PEP 440
        run: |
          uv run --no-project --with packaging python - <<'EOF'
          from packaging.version import Version, InvalidVersion
          version = "${{ inputs.version }}"
          try:
              Version(version)
          except InvalidVersion:
              raise SystemExit(f"ERROR: '{version}' is not a valid PEP 440 version.")
          print(f"OK: '{version}' is a valid PEP 440 version.")
          EOF

      - name: Write src/pytribeam/_version.py
        # Mirrors the exact structure hatch-vcs generates (see the committed file's
        # current shape), but __commit_id__ stays None (matching what hatch-vcs
        # itself always produces in this project's config) and there is no
        # self-referential commit hash: the commit this file lives in cannot know
        # its own hash ahead of time, and the git tag is already the authoritative
        # commit pointer (git rev-list -n1 vX.Y.Z).
        run: |
          uv run --no-project --with packaging python - <<'EOF'
          from packaging.version import Version

          version_str = "${{ inputs.version }}"
          v = Version(version_str)

          release = list(v.release)
          while len(release) < 3:
              release.append(0)

          suffix = None
          if v.pre is not None:
              suffix = f"{v.pre[0]}{v.pre[1]}"
          elif v.dev is not None:
              suffix = f"dev{v.dev}"
          elif v.post is not None:
              suffix = f"post{v.post}"

          version_tuple = tuple(release) + ((suffix,) if suffix else ())

          lines = [
              "# file generated by vcs-versioning",
              f"# do not edit manually — bumped by prepare-release.yml ahead of tagging v{version_str}",
              "from __future__ import annotations",
              "",
              "__all__ = [",
              '    "__version__",',
              '    "__version_tuple__",',
              '    "version",',
              '    "version_tuple",',
              '    "__commit_id__",',
              '    "commit_id",',
              "]",
              "",
              "version: str",
              "__version__: str",
              "__version_tuple__: tuple[int | str, ...]",
              "version_tuple: tuple[int | str, ...]",
              "commit_id: str | None",
              "__commit_id__: str | None",
              "",
              f"__version__ = version = {version_str!r}",
              f"__version_tuple__ = version_tuple = {version_tuple!r}",
              "",
              "__commit_id__ = commit_id = None",
              f"# exact commit: see git tag v{version_str} (git rev-list -n1 v{version_str})",
              "",
          ]
          content = "\n".join(lines)

          with open("src/pytribeam/_version.py", "w") as f:
              f.write(content)

          print(content)
          EOF

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump _version.py for v${{ inputs.version }} release"
          title: "chore: bump _version.py for v${{ inputs.version }} release"
          body: |
            Prepares `src/pytribeam/_version.py` for the upcoming `v${{ inputs.version }}` tag.

            This is a static fallback only used when git metadata is unavailable
            (zip downloads, offline installs). It has no effect on the wheel/sdist,
            which always get their version from `hatch-vcs` at build time.

            Merge this PR, then tag the resulting commit as `v${{ inputs.version }}`
            per the release runbook in CONTRIBUTING.md. `release.yml`'s `validate_tag`
            job will refuse the tag if this file doesn't match.
          branch: "prepare-release/v${{ inputs.version }}"
          base: ${{ inputs.branch }}
          add-paths: src/pytribeam/_version.py
